name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Enable corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Enable corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install FFmpeg
        # Official Ubuntu package, minus the Recommends (VA/VDPAU drivers, SDL,
        # PulseAudio, ...) we don't need for headless transcoding — that trims the
        # download from ~94 MB / 99 packages to the codec libs only. Retried to
        # ride out transient apt mirror hiccups.
        run: |
          for attempt in 1 2 3; do
            sudo apt-get update && \
            sudo apt-get install -y --no-install-recommends ffmpeg && break
            echo "::warning::apt-get failed (attempt $attempt), retrying in 10s"
            sleep 10
          done
          ffmpeg -version && ffprobe -version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm test

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Enable corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
