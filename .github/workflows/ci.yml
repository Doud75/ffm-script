name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Enable corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Enable corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install FFmpeg
        # GitHub's Ubuntu runners default to azure.archive.ubuntu.com, a chronically
        # flaky mirror (actions/runner-images#7048, #6486). Repoint apt at the
        # canonical archive.ubuntu.com — same official Ubuntu package, reliable
        # source. Noble keeps its sources in deb822 sources.list.d/ubuntu.sources.
        # --no-install-recommends drops the VA/VDPAU drivers, SDL, PulseAudio, ...
        # we don't need for headless transcoding (~94 MB → codec libs only).
        run: |
          sudo sed -i 's|azure\.archive\.ubuntu\.com|archive.ubuntu.com|g' \
            /etc/apt/sources.list.d/ubuntu.sources /etc/apt/sources.list 2>/dev/null || true
          for attempt in 1 2 3; do
            sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg && break
            echo "::warning::apt failed (attempt $attempt), retrying in 5s"; sleep 5
          done
          ffmpeg -version && ffprobe -version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm test

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Enable corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
