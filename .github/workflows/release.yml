name: Release

# Publishes to npm when a version tag is pushed (e.g. `git push --follow-tags`
# after `npm version`). The package is never published from a local machine.
on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # required to create the GitHub Release
      id-token: write # required for npm Trusted Publishing (OIDC) + provenance
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Enable corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      # Trusted Publishing via OIDC requires npm >= 11.5.1.
      - name: Update npm
        run: npm install -g npm@latest

      - name: Install FFmpeg
        # GitHub's Ubuntu runners default to azure.archive.ubuntu.com, a chronically
        # flaky mirror (actions/runner-images#7048, #6486). Repoint apt at the
        # canonical archive.ubuntu.com — same official Ubuntu package, reliable
        # source. Noble keeps its sources in deb822 sources.list.d/ubuntu.sources.
        # --no-install-recommends drops the VA/VDPAU drivers, SDL, PulseAudio, ...
        # we don't need for headless transcoding (~94 MB → codec libs only).
        run: |
          sudo sed -i 's|azure\.archive\.ubuntu\.com|archive.ubuntu.com|g' \
            /etc/apt/sources.list.d/ubuntu.sources /etc/apt/sources.list 2>/dev/null || true
          for attempt in 1 2 3; do
            sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg && break
            echo "::warning::apt failed (attempt $attempt), retrying in 5s"; sleep 5
          done
          ffmpeg -version && ffprobe -version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      # No token needed: authentication is via OIDC (Trusted Publishing).
      # Configure the trusted publisher for this package on npmjs.com first.
      - name: Publish to npm
        run: npm publish --provenance --access public

      # Create the matching GitHub Release so the repo's "Latest" badge tracks the
      # published version. Notes are the CHANGELOG section for this version; if it
      # has none, fall back to GitHub's auto-generated notes.
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v ver="$version" '
            $0 ~ "^## \\[" ver "\\]" { flag=1; next }
            flag && /^## \[/ { exit }
            flag { print }
          ' CHANGELOG.md > notes.md
          if [ -s notes.md ]; then
            gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-file notes.md
          else
            gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes
          fi
