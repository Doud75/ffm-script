name: Feature request
description: Suggest a new capability or improvement
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea! `ffm-script` aims for a small, focused API, so please
        describe the use case first — it helps us find the right shape for the feature.

  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight checklist
      options:
        - label: I have searched the [existing issues](https://github.com/Doud75/ffm-script/issues) and this isn't a duplicate.
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem / use case
      description: What are you trying to do, and why can't you do it today?
    validations:
      required: true

  - type: textarea
    id: proposed-api
    attributes:
      label: Proposed API
      description: A sketch of the call and options you'd like. Doesn't need to be final.
      render: ts
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you've tried or other approaches you've thought about.
    validations:
      required: false

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I'd be willing to open a pull request for this feature.
          required: false
